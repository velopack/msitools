name: Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            msystem: MINGW32
            prefix: mingw-w64-i686
          - arch: x64
            msystem: UCRT64
            prefix: mingw-w64-ucrt-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            ${{ matrix.prefix }}-gcc
            ${{ matrix.prefix }}-meson
            ${{ matrix.prefix }}-pkgconf
            ${{ matrix.prefix }}-glib2
            ${{ matrix.prefix }}-libxml2
            mingw-w64-ucrt-x86_64-vala
            bison

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/${{ matrix.msystem }}:/ucrt64/bin:$PATH"
          export XDG_DATA_DIRS="/ucrt64/share:/${MSYSTEM,,}/share:/usr/share"
          meson setup builddir --default-library=static --prefer-static
          meson compile -C builddir

      - name: Verify
        run: builddir\wixl.exe --version

      - name: Rename binary
        run: copy builddir\wixl.exe wixl-win-${{ matrix.arch }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: build-win-${{ matrix.arch }}
          path: wixl-win-${{ matrix.arch }}.exe
          retention-days: 1

  linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build in Alpine
        run: |
          docker run --rm -v "$PWD":/src -w /src alpine:latest sh -c '
            apk add --no-cache \
              gcc musl-dev meson vala bison pkgconf file \
              glib-dev glib-static libxml2-dev libxml2-static zlib-dev zlib-static \
              pcre2-dev util-linux-dev xz-dev libffi-dev
            meson setup builddir --default-library=static --prefer-static
            meson compile -C builddir
            file builddir/wixl
            builddir/wixl --version
          '

      - name: Rename binary
        run: cp builddir/wixl wixl-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux-${{ matrix.arch }}
          path: wixl-linux-${{ matrix.arch }}
          retention-days: 1

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM64 dependencies
        run: |
          brew install meson vala bison glib libxml2
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Build ARM64
        run: |
          meson setup build-arm64 --default-library=static --prefer-static
          meson compile -C build-arm64
          file build-arm64/wixl
          build-arm64/wixl --version

      - name: Install x86_64 Homebrew and dependencies
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install meson vala bison glib libxml2

      - name: Build x86_64 (via Rosetta)
        run: |
          arch -x86_64 bash -c '
            export PATH="/usr/local/bin:/usr/local/opt/bison/bin:$PATH"
            meson setup build-x64 --default-library=static --prefer-static
            meson compile -C build-x64
            file build-x64/wixl
            build-x64/wixl --version
          '

      - name: Create universal binary
        run: |
          lipo -create build-arm64/wixl build-x64/wixl -output wixl-osx-universal
          chmod +x wixl-osx-universal
          file wixl-osx-universal

      - uses: actions/upload-artifact@v4
        with:
          name: build-osx
          path: wixl-osx-universal
          retention-days: 1

  package:
    runs-on: ubuntu-latest
    needs: [windows, linux, macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: List binaries
        run: ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: wixl
          path: |
            wixl-win-x86.exe
            wixl-win-x64.exe
            wixl-linux-x64
            wixl-linux-arm64
            wixl-osx-universal
